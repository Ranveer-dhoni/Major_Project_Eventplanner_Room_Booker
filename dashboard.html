<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h2>Event Planner & Room Booking</h2>

    <div class="section">
      <h3>Create Event</h3>
      <input id="eventName" placeholder="Event name">
      <input id="eventDate" type="date">
      <button onclick="createEvent()">Add Event</button>

      <h3>Events</h3>
      <ul id="eventList"></ul>
    </div>

    <div class="section">
      <h3>Book Room</h3>
      <input id="roomName" placeholder="Room name">
      <input id="roomDate" type="date">
      <button onclick="bookRoom()">Book Room</button>

      <h3>Room Bookings</h3>
      <ul id="roomList"></ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

<h3>Calendar View</h3>
<div> id="calendar"</div>
