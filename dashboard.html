<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body { font-family: Arial; margin: 40px; }
    input, button { margin: 5px; padding: 8px; width: 250px; }
    .section { margin-bottom: 30px; }
  </style>
</head>
<body>

  <h2>Event Planner & Room Booking System</h2>

  <div class="section">
    <h3>Create Event</h3>
    <input id="eventName" placeholder="Event name"><br>
    <input id="eventDate" type="date"><br>
    <button onclick="createEvent()">Add Event</button>

    <h3>Events</h3>
    <ul id="eventList"></ul>
  </div>

  <div class="section">
    <h3>Book Room</h3>
    <input id="roomName" placeholder="Room name"><br>
    <input id="roomDate" type="date"><br>
    <button onclick="bookRoom()">Book Room</button>

    <h3>Room Bookings</h3>
    <ul id="roomList"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
