<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bookings</title>
    <link rel="stylesheet" href="style.css">
</head>

<body onload="checkAccess()">

    <div class="nav-bar card">
        <button class="nav-btn" onclick="location.href='home.html'">Home</button>
        <button class="nav-btn" onclick="location.href='dashboard.html'">Dashboard</button>
        <button class="nav-btn" onclick="location.href='calendar.html'">Calendar</button>
        <button class="nav-btn" onclick="location.href='events.html'">Events</button>
    </div>

    <div class="container">

        <h2>Room Bookings</h2>

        <div id="teacherBookingSection" class="card">
            <h3>Create a booking</h3>

            <input id="roomName" placeholder="Room Name">
            <input id="roomDate" type="date">

            <button onclick="createBooking()">Add Booking</button>
        </div>

        <div class="card">
            <h3>Past Bookings</h3>
            <ul id="pastBookings"></ul>
        </div>

        <div class="card">
            <h3>Future Bookings</h3>
            <ul id="futureBookings"></ul>
        </div>

    </div>

    <script src="auth.js"></script>
    <script src="bookings.js"></script>
</body>
</html>
