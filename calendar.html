<!DOCTYPE html>
<html>
<head>
    <title>Calendar</title>
    <link rel="stylesheet" href="style.css">
</head>

<body onload="checkAccess()">

    <!-- Navigation Bar -->
    <div class="nav-bar card">
        <button class="nav-btn" onclick="location.href='home.html'">Home</button>
        <button class="nav-btn" onclick="location.href='dashboard.html'">Dashboard</button>
        <button class="nav-btn" onclick="location.href='bookings.html'">Bookings</button>
        <button class="nav-btn" onclick="location.href='events.html'">Events</button>
    </div>

    <div class="container">

        <h2>Monthly Calendar</h2>

        <!-- Month Controls -->
        <div class="calendar-controls">
            <button class="nav-btn" onclick="prevMonth()">Previous</button>
            <h3 id="monthLabel"></h3>
            <button class="nav-btn" onclick="nextMonth()">Next</button>
        </div>

        <!-- Calendar Grid -->
        <div id="calendarGrid" class="calendar-grid"></div>

    </div>

    <script src="auth.js"></script>
    <script src="calendar.js"></script>

</body>
</html>
