<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link rel="stylesheet" href="style.css">
</head>

<body onload="checkAccess()">

    <div class="container card">
        <h2>Welcome to the Space Hub</h2>

        <p class="welcome-text">
            Logged in as: <strong id="userRole"></strong>
        </p>

        <div class="nav-buttons">
            <button class="nav-btn" onclick="location.href='dashboard.html'">Dashboard</button>
            <button class="nav-btn" onclick="location.href='calendar.html'">Calendar</button>
            <button class="nav-btn" onclick="location.href='bookings.html'">Bookings</button>
            <button class="nav-btn" onclick="location.href='events.html'">Events</button>
            <button class="nav-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        const role = localStorage.getItem("role");
        document.getElementById("userRole").innerText =
            role.charAt(0).toUpperCase() + role.slice(1);
    </script>
</body>
</html>
